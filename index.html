<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View 365</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #eef1f5;
  --bg2:         #ffffff;
  --fg:          #1e2433;
  --muted:       #8a96a8;
  --border:      #c8d4e2;
  --weekend:     #eef2f7;
  --hover:       #e6eaf0;
  --today-bg:    #2563eb;
  --today-fg:    #ffffff;
  --hdr-bg:      #edf5ff;
  --hdr-fg:      #0f1923;
  --lbl-bg:      #edf5ff;
  --lbl-fg:      #0f1923;
  --invalid-bg:  #f5f7fa;
  /* header chrome — adapts to light header */
  --hdr-border:       rgba(0,0,0,0.14);
  --hdr-hover:        rgba(0,0,0,0.07);
  --hdr-hover-border: rgba(0,0,0,0.24);
  --hdr-muted:        rgba(0,0,0,0.38);
  --hdr-track:        rgba(0,0,0,0.15);
  --hdr-thumb:        rgba(0,0,0,0.4);
  --row-h: 85px;
  --col-w: 44px;
}

body.dark {
  --bg:          #2a3a58;
  --bg2:         #334468;
  --fg:          #edf4ff;
  --muted:       #98b0cc;
  --border:      #4e6585;
  --weekend:     #2e4068;
  --hover:       #3a5080;
  --today-bg:    #2563eb;
  --today-fg:    #ffffff;
  --hdr-bg:      #2e4878;
  --hdr-fg:      #eaf4ff;
  --lbl-bg:      #2e4878;
  --lbl-fg:      #eaf4ff;
  --invalid-bg:  #263860;
  /* header chrome — adapts to dark header */
  --hdr-border:       rgba(255,255,255,0.15);
  --hdr-hover:        rgba(255,255,255,0.1);
  --hdr-hover-border: rgba(255,255,255,0.28);
  --hdr-muted:        rgba(255,255,255,0.35);
  --hdr-track:        rgba(255,255,255,0.18);
  --hdr-thumb:        rgba(255,255,255,0.75);
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--fg);
}

/* ─────────────── HEADER BAR ─────────────── */
.hdr {
  position: sticky; top: 0; z-index: 200;
  background: var(--hdr-bg); color: var(--hdr-fg);
  display: flex; align-items: center;
  padding: 0 16px; height: 52px; gap: 14px;
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.hdr-left  { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.hdr-mid   { display: flex; align-items: center; gap: 14px; flex: 1; justify-content: center; }
.hdr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.hdr h1 { font-size: 13px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--hdr-fg); opacity: 0.9; }
.hdr-nav { display: flex; align-items: center; gap: 6px; }
.hdr-nav button {
  background: none; border: 1px solid var(--hdr-border); border-radius: 5px;
  color: var(--hdr-fg); width: 28px; height: 28px;
  font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.12s, border-color 0.12s;
}
.hdr-nav button:hover { background: var(--hdr-hover); border-color: var(--hdr-hover-border); }
.hdr-year { font-size: 15px; font-weight: 600; min-width: 40px; text-align: center; }
.hdr-btn {
  background: none; border: 1px solid var(--hdr-border); border-radius: 5px;
  color: var(--hdr-fg); padding: 5px 11px;
  font-size: 11px; cursor: pointer; white-space: nowrap;
  transition: background 0.12s, border-color 0.12s;
}
.hdr-btn:hover { background: var(--hdr-hover); border-color: var(--hdr-hover-border); }
.user-email { color: var(--hdr-muted); font-size: 11px; }

/* ─────────────── ZOOM SLIDER ─────────────── */
.zoom-ctrl { display: flex; align-items: center; gap: 7px; }
.zoom-lbl  { font-size: 10px; color: var(--hdr-muted); min-width: 50px; text-align: center; white-space: nowrap; }
.zoom-end  { font-size: 11px; color: var(--hdr-muted); user-select: none; }
.zoom-slider {
  -webkit-appearance: none; appearance: none;
  width: 96px; height: 3px; background: var(--hdr-track); border-radius: 2px; outline: none; cursor: pointer;
}
.zoom-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--hdr-thumb); cursor: pointer;
}
.zoom-slider::-moz-range-thumb {
  width: 14px; height: 14px; border-radius: 50%; border: none;
  background: var(--hdr-thumb); cursor: pointer;
}

/* ─────────────── CALENDAR PICKER ─────────────── */
.cal-picker { position: relative; }
.cal-drop {
  position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 0;
  min-width: 215px; max-height: 310px; overflow-y: auto;
  box-shadow: 0 8px 30px rgba(0,0,0,0.35); z-index: 400;
}
.cal-drop-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 12px 8px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); border-bottom: 1px solid var(--border);
}
.cal-drop-hdr .acts { display: flex; gap: 8px; }
.cal-drop-hdr button { background: none; border: none; color: var(--muted); font-size: 11px; cursor: pointer; }
.cal-drop-hdr button:hover { color: var(--fg); }
.cal-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 12px; cursor: pointer; font-size: 12px; color: var(--fg);
}
.cal-item:hover { background: var(--hover); }
.cal-item input[type=checkbox] { accent-color: #5b9cf6; cursor: pointer; flex-shrink: 0; }
.cal-swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.cal-name   { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ─────────────── YEAR GRID (wall planner) ─────────────── */
/*
  Layout:  rows    = months (JAN → DEC)
           columns = days 1 → 31
  col 1  = month label (sticky left)
  col 2–32 = days 1–31
  row 1  = day-number header (sticky top)
  row 2–13 = month rows
*/
.year-grid {
  display: grid;
  grid-template-columns: 62px repeat(31, minmax(var(--col-w), 1fr));
  grid-template-rows: 36px repeat(12, var(--row-h));
  width: 100%;
  min-width: calc(62px + 31 * var(--col-w));
}

/* ── Corner cell (top-left) ── */
.g-corner {
  grid-column: 1; grid-row: 1;
  position: sticky; top: 52px; left: 0; z-index: 150;
  background: var(--hdr-bg);
  border-right: 2px solid var(--border);
  border-bottom: 2px solid var(--border);
  border-left: 2px solid var(--border);
  border-top: 2px solid var(--border);
}

/* ── Day-number header row ── */
.g-day-hdr {
  grid-row: 1;
  position: sticky; top: 52px; z-index: 120;
  background: var(--hdr-bg); color: var(--hdr-fg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  border-right: 1px solid var(--border);
  border-bottom: 2px solid var(--border);
  line-height: 1.2;
}

/* ── Month label (left column) ── */
.g-month-lbl {
  grid-column: 1;
  position: sticky; left: 0; z-index: 100;
  background: var(--lbl-bg); color: var(--lbl-fg);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
  border-right: 2px solid var(--border);
  border-bottom: 1px solid var(--border);
  cursor: default;
  user-select: none;
}

/* ── Day cells ── */
.g-day {
  height: var(--row-h);
  min-height: 40px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 4px 5px;
  background: var(--bg2);
  cursor: pointer;
  overflow: hidden;
  transition: background 0.07s;
}
.g-day:hover       { background: var(--hover); }
.g-day.wknd        { background: var(--weekend); }
.g-day.wknd:hover  { background: var(--hover); }
.g-day.today {
  outline: 3px solid #dc2626;
  outline-offset: -3px;
  background: var(--bg2) !important;
}
.g-day.today:hover { background: var(--hover) !important; }
.g-day.invalid {
  background: var(--invalid-bg);
  cursor: default;
  pointer-events: none;
}

/* Day cell top row */
.g-day-top {
  display: flex; align-items: baseline; gap: 3px;
  margin-bottom: 3px;
}
.g-day-dow {
  font-size: 8px; font-weight: 700; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--muted);
}
.g-day-num { font-size: 12px; font-weight: 600; }
.g-day.today .g-day-num { color: #dc2626; font-weight: 800; }

/* Events */
.g-day-events { display: flex; flex-direction: column; gap: 2px; }
.g-day-event {
  font-size: 10px; font-weight: 500;
  padding: 1px 4px; border-radius: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: #fff; line-height: 1.4;
}
.g-day-event.allday { border-left: 3px solid rgba(255,255,255,0.4); }
.g-more { font-size: 9px; color: var(--muted); padding: 0 3px; }

/* ── Quarter dividers (APR / JUL / OCT) ── */
.qtr-start { border-top: 3px solid var(--muted) !important; }

/* Dense mode — row height < 55px */
body.dense .g-day       { padding: 2px 3px; }
body.dense .g-day-dow   { display: none; }
body.dense .g-day-num   { font-size: 10px; }
body.dense .g-day-event { font-size: 9px !important; padding: 1px 3px !important; }
body.dense .g-day-top   { margin-bottom: 1px; }
body.dense .g-day-events { gap: 1px; }
body.dense .g-more      { font-size: 8px; }

/* ─────────────── SIGN-IN ─────────────── */
.signin-wrap {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 80vh; gap: 22px; padding: 40px;
}
.signin-wrap h2 { font-size: 26px; font-weight: 300; letter-spacing: -0.3px; }
.signin-wrap p  { color: var(--muted); font-size: 14px; text-align: center; }
.signin-btn {
  display: flex; align-items: center; gap: 10px;
  background: var(--fg); color: var(--bg);
  border: none; border-radius: 8px;
  padding: 12px 28px; font-size: 14px; font-weight: 500; cursor: pointer;
}
.signin-btn:hover { opacity: 0.85; }

/* ─────────────── LOADING ─────────────── */
.loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; gap: 14px;
  color: var(--muted); font-size: 14px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border); border-top-color: var(--fg);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─────────────── MODAL ─────────────── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 900;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(2px);
}
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 22px;
  max-width: 400px; width: 90%; max-height: 72vh; overflow-y: auto;
  box-shadow: 0 10px 44px rgba(0,0,0,0.22);
}
.modal h3     { font-size: 14px; font-weight: 600; margin-bottom: 14px; padding-right: 24px; }
.modal-x      { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); }
.modal-x:hover { color: var(--fg); }
.ev           { padding: 9px 0; border-bottom: 1px solid var(--border); }
.ev:last-child { border-bottom: none; }
.ev-title     { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 7px; }
.ev-dot       { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ev-meta      { font-size: 11px; color: var(--muted); margin-top: 3px; padding-left: 14px; }

/* ─────────────── LEGEND ─────────────── */
.legend {
  padding: 10px 20px; border-top: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 14px;
  font-size: 11px; color: var(--muted); background: var(--bg2);
}
.leg-item { display: flex; align-items: center; gap: 5px; }
.leg-dot  { width: 8px; height: 8px; border-radius: 50%; }

/* ─────────────── HOVER TOOLTIP ─────────────── */
#tip {
  position: fixed; z-index: 800;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 10px;
  min-width: 160px; max-width: 260px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.22);
  pointer-events: none; font-size: 12px;
}
.tip-date { font-weight: 700; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
.tip-ev   { display: flex; align-items: center; gap: 6px; padding: 2px 0; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tip-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tip-more { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* ─────────────── PRINT ─────────────── */
@media print {
  .hdr { position: static !important; }
  .g-corner, .g-day-hdr { position: static !important; }
  .g-month-lbl { position: static !important; writing-mode: horizontal-tb; transform: none; }
  .cal-drop, .zoom-ctrl { display: none !important; }
}
</style>
</head>
<body>

<div id="tip" style="display:none;"></div>
<div class="hdr">
  <div class="hdr-left">
    <h1>View 365</h1>
    <div class="hdr-nav">
      <button onclick="changeYear(year-1)">‹</button>
      <span class="hdr-year" id="yearLabel">2026</span>
      <button onclick="changeYear(year+1)">›</button>
    </div>
  </div>

  <div class="hdr-mid" id="hdrMid">
    <div class="zoom-ctrl">
      <span class="zoom-end">−</span>
      <input type="range" class="zoom-slider" id="zoomSlider"
             min="45" max="200" value="85"
             oninput="setRowH(+this.value)">
      <span class="zoom-end">+</span>
      <span class="zoom-lbl" id="zoomLbl">85%</span>
    </div>
  </div>

  <div class="hdr-right" id="hdrRight">
    <button class="hdr-btn" onclick="toggleDark()">◑</button>
    <button class="hdr-btn" onclick="window.print()">⎙</button>
  </div>
</div>

<div id="app"></div>
<div class="legend" id="legend" style="display:none;"></div>

<script>
const CLIENT_ID = '142509151438-e5ebvf3rkn3298cdqnvse6su6pvfd47k.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/calendar.readonly email';
const MONS      = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const DOW_S     = ['Su','Mo','Tu','We','Th','Fr','Sa'];

let token       = sessionStorage.getItem('v365_tok')   || null;
let email       = sessionStorage.getItem('v365_email') || '';
let year        = new Date().getFullYear();
let cals        = [];
let enabledCals = null;
let evts        = {};
let tclient     = null;
let isDark      = localStorage.getItem('v365_dark') === '1';
let zoom        = parseInt(localStorage.getItem('v365_zoom') || '85');
let calDropOpen = false;

// ── Helpers ──
function dk(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
// Parse a YYYY-MM-DD string as LOCAL midnight (not UTC) to avoid timezone shift
function parseLocalDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function fmt(dt) {
  if (!dt) return '';
  let h = dt.getHours(), m = dt.getMinutes(), ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return m ? `${h}:${String(m).padStart(2,'0')} ${ap}` : `${h} ${ap}`;
}
function isCalEnabled(id) { return !enabledCals || enabledCals.has(id); }

// ── Zoom (scales row height + column width together) ──
function applyZoom(z) {
  zoom = Math.max(45, Math.min(200, z));
  const rowH = zoom;
  const colW = Math.max(28, Math.round(zoom * 0.52));
  document.documentElement.style.setProperty('--row-h', rowH + 'px');
  document.documentElement.style.setProperty('--col-w', colW + 'px');
  document.body.classList.toggle('dense', zoom < 55);
  localStorage.setItem('v365_zoom', zoom);
  const s = document.getElementById('zoomSlider'); if (s) s.value = zoom;
  const l = document.getElementById('zoomLbl');    if (l) l.textContent = zoom + '%';
}
function setRowH(z) { applyZoom(z); }

// ── Fit to Screen ──
function fitToScreen() {
  // Width fit: 62px (month col) + 31 * col-w fills viewport width
  const availW = window.innerWidth - 4;
  const targetColW = Math.floor((availW - 62) / 31);
  const zoomW = Math.round(targetColW / 0.52);

  // Height fit: 52px (header) + 36px (day-row) + 12 * row-h + 38px (legend) = viewport height
  // row-h = zoom, so: zoom = (availH - 126) / 12
  const availH = window.innerHeight - 52 - 36 - 38;
  const zoomH = Math.floor(availH / 12);

  // Use the smaller of the two so everything fits in both dimensions
  applyZoom(Math.min(zoomW, zoomH));
}

// ── Dark Mode ──
function toggleDark() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  localStorage.setItem('v365_dark', isDark ? '1' : '0');
}

// ── Init ──
function init() {
  if (isDark) document.body.classList.add('dark');
  applyZoom(zoom);
  document.getElementById('yearLabel').textContent = year;
  token ? onIn() : showSignIn();
}

// ── Auth ──
function initTC() {
  if (tclient) return;
  tclient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: r => {
      if (r.error) { alert('Sign-in error: ' + r.error); return; }
      token = r.access_token;
      sessionStorage.setItem('v365_tok', token);
      getEmail();
    }
  });
}
function signIn() {
  if (typeof google === 'undefined' || !google.accounts) { alert('Google loading… try again.'); return; }
  initTC(); tclient.requestAccessToken();
}
async function getEmail() {
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo',
      { headers: { Authorization: 'Bearer ' + token } });
    if (r.ok) { const d = await r.json(); email = d.email || ''; sessionStorage.setItem('v365_email', email); }
  } catch(e) {}
  onIn();
}
function signOut() {
  token = null; email = ''; cals = []; evts = {}; enabledCals = null;
  sessionStorage.removeItem('v365_tok'); sessionStorage.removeItem('v365_email');
  document.getElementById('legend').style.display = 'none';
  showSignIn(); renderHdr();
}
function onIn() { renderHdr(); fetchAllEvents(); }

// ── Header ──
function renderHdr() {
  const mid = document.getElementById('hdrMid');
  const rgt = document.getElementById('hdrRight');

  const zoomHtml = `
    <div class="zoom-ctrl">
      <span class="zoom-end">−</span>
      <input type="range" class="zoom-slider" id="zoomSlider"
             min="45" max="200" value="${zoom}" oninput="setRowH(+this.value)">
      <span class="zoom-end">+</span>
      <span class="zoom-lbl" id="zoomLbl">${zoom}%</span>
      <button class="hdr-btn" onclick="fitToScreen()" title="Fit entire year to screen width">⊡ Fit</button>
    </div>`;

  if (token && cals.length > 0) {
    const cnt = enabledCals ? enabledCals.size : cals.length;
    mid.innerHTML = `
      <div class="cal-picker" id="calPicker">
        <button class="hdr-btn" onclick="toggleCalDrop(event)">
          📅 Calendars${cnt < cals.length ? ` (${cnt})` : ''} ▾
        </button>
        <div class="cal-drop" id="calDrop" style="display:none;"></div>
      </div>
      ${zoomHtml}`;
    renderCalDrop();
  } else {
    mid.innerHTML = zoomHtml;
  }

  rgt.innerHTML =
    (token
      ? `<span class="user-email">${email}</span>
         <button class="hdr-btn" onclick="signOut()">Sign out</button>`
      : `<button class="hdr-btn" onclick="signIn()">Sign in</button>`) +
    `<button class="hdr-btn" onclick="toggleDark()">◑</button>
     <button class="hdr-btn" onclick="window.print()">⎙</button>`;
}

// ── Calendar Dropdown ──
function renderCalDrop() {
  const drop = document.getElementById('calDrop'); if (!drop) return;
  let h = `<div class="cal-drop-hdr"><span>Calendars</span>
    <span class="acts">
      <button onclick="calSelectAll()">All</button>
      <button onclick="calSelectNone()">None</button>
    </span></div>`;
  cals.forEach(c => {
    const safe = c.id.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    h += `<label class="cal-item">
      <input type="checkbox" ${isCalEnabled(c.id)?'checked':''} onchange="toggleCal('${safe}',this.checked)">
      <span class="cal-swatch" style="background:${c.color}"></span>
      <span class="cal-name" title="${c.name}">${c.name}</span></label>`;
  });
  drop.innerHTML = h;
}
function toggleCalDrop(e) {
  e.stopPropagation(); calDropOpen = !calDropOpen;
  const d = document.getElementById('calDrop'); if (d) d.style.display = calDropOpen ? 'block' : 'none';
}
function toggleCal(id, checked) {
  if (!enabledCals) enabledCals = new Set(cals.map(c => c.id));
  if (checked) enabledCals.add(id); else enabledCals.delete(id);
  saveCalPrefs(); renderHdr(); buildGrid();
}
function calSelectAll() {
  enabledCals = new Set(cals.map(c => c.id)); saveCalPrefs(); renderHdr();
  setTimeout(() => { calDropOpen = true; const d=document.getElementById('calDrop'); if(d) d.style.display='block'; }, 0);
  buildGrid();
}
function calSelectNone() {
  enabledCals = new Set(); saveCalPrefs(); renderHdr();
  setTimeout(() => { calDropOpen = true; const d=document.getElementById('calDrop'); if(d) d.style.display='block'; }, 0);
  buildGrid();
}
function saveCalPrefs() {
  localStorage.setItem('v365_cals', JSON.stringify([...(enabledCals||cals.map(c=>c.id))]));
}
document.addEventListener('click', e => {
  if (calDropOpen && !e.target.closest('#calPicker')) {
    calDropOpen = false;
    const d = document.getElementById('calDrop'); if (d) d.style.display = 'none';
  }
});

// ── Sign-in Screen ──

// ── API ──
async function gf(url) {
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
  if (r.status === 401) { signOut(); throw new Error('expired'); }
  return r;
}
async function fetchAllEvents() {
  document.getElementById('app').innerHTML =
    '<div class="loading"><div class="spinner"></div><p>Loading your year…</p></div>';
  try {
    const cr = await gf('https://www.googleapis.com/calendar/v3/users/me/calendarList');
    const cd = await cr.json();
    cals = (cd.items||[]).filter(c=>c.selected!==false)
      .map(c=>({ id:c.id, name:c.summary||c.id, color:c.backgroundColor||'#555' }));

    const saved = localStorage.getItem('v365_cals');
    if (saved && !enabledCals) {
      try {
        const arr = JSON.parse(saved), valid = new Set(cals.map(c=>c.id));
        const ok = arr.filter(id=>valid.has(id));
        enabledCals = ok.length ? new Set(ok) : null;
      } catch(e) { enabledCals = null; }
    }

    evts = {};
    const tMin = new Date(year, 0, 1).toISOString();
    const tMax = new Date(year, 11, 31, 23, 59, 59).toISOString();

    for (const cal of cals) {
      let pt = '';
      do {
        let url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events` +
          `?timeMin=${tMin}&timeMax=${tMax}&singleEvents=true&orderBy=startTime&maxResults=2500&timeZone=America/Chicago`;
        if (pt) url += '&pageToken=' + pt;
        const er = await gf(url); const ed = await er.json();
        for (const ev of (ed.items||[])) {
          if (ev.status==='cancelled') continue;
          const allDay = !!ev.start.date;
          const sd = allDay ? parseLocalDate(ev.start.date) : new Date(ev.start.dateTime);
          const en = allDay ? parseLocalDate(ev.end.date)   : new Date(ev.end.dateTime);
          if (allDay) {
            for (let d=new Date(sd); d<en; d.setDate(d.getDate()+1)) addEv(new Date(d),ev,cal,true);
          } else { addEv(sd,ev,cal,false); }
        }
        pt = ed.nextPageToken || '';
      } while (pt);
    }
    renderHdr(); buildGrid();
  } catch(e) {
    if (e.message!=='expired')
      document.getElementById('app').innerHTML =
        `<div class="loading"><p>Error loading calendar. <button onclick="fetchAllEvents()">Retry</button></p></div>`;
  }
}
function addEv(d, ev, cal, allDay) {
  if (d.getFullYear()!==year) return;
  const key=dk(d); if(!evts[key]) evts[key]=[];
  evts[key].push({ title:ev.summary||'(No title)', start:ev.start.dateTime?new Date(ev.start.dateTime):null,
    allDay, color:cal.color, calId:cal.id, calName:cal.name, location:ev.location||'' });
}

// ── Build Wall Calendar Grid ──
function buildGrid() {
  const today = dk(new Date());
  let html = '<div class="year-grid" id="yearGrid">';

  // Corner
  html += '<div class="g-corner"></div>';

  // Day-number header row (cols 2–32)
  for (let d = 1; d <= 31; d++) {
    html += `<div class="g-day-hdr">${d}</div>`;
  }

  // 12 month rows
  for (let m = 0; m < 12; m++) {
    const isQtr = m === 3 || m === 6 || m === 9; // APR / JUL / OCT

    // Month label
    html += `<div class="g-month-lbl${isQtr ? ' qtr-start' : ''}">${MONS[m]}</div>`;

    // 31 day cells
    for (let d = 1; d <= 31; d++) {
      const date  = new Date(year, m, d);
      const valid = date.getMonth() === m; // rolls to next month if invalid

      if (!valid) {
        html += `<div class="g-day invalid${isQtr ? ' qtr-start' : ''}"></div>`;
      } else {
        const key     = dk(date);
        const dow     = date.getDay();
        const isToday = key === today;
        const isWknd  = dow === 0 || dow === 6;
        const dayEvts = (evts[key] || []).filter(e => isCalEnabled(e.calId));

        let cls = 'g-day';
        if (isQtr)       cls += ' qtr-start';
        if (isToday)     cls += ' today';
        else if (isWknd) cls += ' wknd';

        html += `<div class="${cls}" onclick="showModal('${key}')">`;
        html += '<div class="g-day-top">';
        html += `<span class="g-day-dow">${DOW_S[dow]}</span>`;
        html += `<span class="g-day-num">${d}</span>`;
        html += '</div>';

        if (dayEvts.length) {
          html += '<div class="g-day-events">';
          const MAX = 4;
          dayEvts.slice(0, MAX).forEach(ev => {
            const t = ev.allDay ? '' : fmt(ev.start) + ' ';
            html += `<div class="g-day-event${ev.allDay?' allday':''}" style="background:${ev.color}" title="${ev.title}">${t}${ev.title}</div>`;
          });
          if (dayEvts.length > MAX)
            html += `<div class="g-more">+${dayEvts.length - MAX} more</div>`;
          html += '</div>';
        }
        html += '</div>';
      }
    }
  }

  html += '</div>';
  document.getElementById('app').innerHTML = html;

  // Legend
  const leg = document.getElementById('legend');
  const vis = cals.filter(c => isCalEnabled(c.id));
  if (vis.length) {
    leg.style.display = 'flex';
    leg.innerHTML = '<span style="font-weight:600;margin-right:4px;">Calendars:</span>' +
      vis.map(c=>`<span class="leg-item"><span class="leg-dot" style="background:${c.color}"></span>${c.name}</span>`).join('');
  } else { leg.style.display = 'none'; }

  // Scroll today into view
  setTimeout(() => {
    const el = document.querySelector('.g-day.today');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
  }, 120);
}

// ── Day Modal ──
function showModal(key) {
  const list = (evts[key]||[]).filter(e=>isCalEnabled(e.calId));
  const [y,m,d] = key.split('-').map(Number);
  const dateStr = new Date(y,m-1,d).toLocaleDateString('en-US',
    { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  let h = `<div class="modal-bg" onclick="if(event.target===this)this.remove()"><div class="modal">`;
  h += `<button class="modal-x" onclick="this.closest('.modal-bg').remove()">✕</button>`;
  h += `<h3>${dateStr}</h3>`;
  if (!list.length) h += '<p style="color:var(--muted);font-size:13px;">No events this day.</p>';
  else list.forEach(ev => {
    h += `<div class="ev"><div class="ev-title"><span class="ev-dot" style="background:${ev.color}"></span>${ev.title}</div>`;
    if (ev.allDay) h += `<div class="ev-meta">All day · ${ev.calName}</div>`;
    else if (ev.start) h += `<div class="ev-meta">${fmt(ev.start)} · ${ev.calName}</div>`;
    if (ev.location) h += `<div class="ev-meta">📍 ${ev.location}</div>`;
    h += '</div>';
  });
  h += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', h);
}

// ── Hover Tooltip ──
let tipTarget = null;
function showTip(cell, key) {
  const list = (evts[key] || []).filter(e => isCalEnabled(e.calId));
  if (!list.length) { hideTip(); return; }
  const tip = document.getElementById('tip');
  const [y, m, d] = key.split('-').map(Number);
  const dateStr = new Date(y, m-1, d).toLocaleDateString('en-US',
    { weekday: 'short', month: 'short', day: 'numeric' });
  let h = `<div class="tip-date">${dateStr}</div>`;
  list.slice(0, 7).forEach(ev => {
    const t = ev.allDay ? '' : fmt(ev.start) + ' ';
    h += `<div class="tip-ev"><span class="tip-dot" style="background:${ev.color}"></span><span style="overflow:hidden;text-overflow:ellipsis">${t}${ev.title}</span></div>`;
  });
  if (list.length > 7) h += `<div class="tip-more">+${list.length - 7} more</div>`;
  tip.innerHTML = h;
  tip.style.display = 'block';
  const rect = cell.getBoundingClientRect();
  const tw = tip.offsetWidth, th = tip.offsetHeight;
  let left = rect.left, top = rect.bottom + 6;
  if (left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;
  if (top + th > window.innerHeight - 8) top = rect.top - th - 6;
  tip.style.left = left + 'px';
  tip.style.top  = top  + 'px';
}
function hideTip() {
  document.getElementById('tip').style.display = 'none';
  tipTarget = null;
}
document.addEventListener('mouseover', e => {
  const cell = e.target.closest('.g-day:not(.invalid)');
  if (cell === tipTarget) return;
  if (!cell) { hideTip(); return; }
  tipTarget = cell;
  const oc = cell.getAttribute('onclick') || '';
  const key = (oc.match(/'([^']+)'/) || [])[1];
  if (key) showTip(cell, key);
});
document.addEventListener('mouseout', e => {
  if (!e.relatedTarget || !e.relatedTarget.closest('#tip, .g-day:not(.invalid)')) hideTip();
});

// ── Year Nav ──
function changeYear(y) {
  year = y; document.getElementById('yearLabel').textContent = year;
  if (token) fetchAllEvents(); else buildGrid();
}

// ── Boot ──
window.addEventListener('load', () => setTimeout(init, 500));
setTimeout(() => {
  if (!document.querySelector('.signin-wrap') &&
      !document.querySelector('.loading') &&
      !document.querySelector('.year-grid')) init();
}, 2500);
</script>
