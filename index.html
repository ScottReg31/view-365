<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View 365</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f8f8;
  --bg2: #ffffff;
  --fg: #111111;
  --muted: #888888;
  --border: #e0e0e0;
  --weekend: #f0f0f0;
  --hover: #e8e8e8;
  --today-bg: #111111;
  --today-fg: #ffffff;
  --header-bg: #111111;
  --header-fg: #ffffff;
  --month-badge: #111111;
  --month-badge-fg: #ffffff;
  --cell-h: 90px;
}

body.dark {
  --bg: #111111;
  --bg2: #1a1a1a;
  --fg: #f0f0f0;
  --muted: #666666;
  --border: #2a2a2a;
  --weekend: #161616;
  --hover: #222222;
  --today-bg: #f0f0f0;
  --today-fg: #111111;
  --header-bg: #000000;
  --header-fg: #f0f0f0;
  --month-badge: #f0f0f0;
  --month-badge-fg: #111111;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--fg);
}

/* ── Header ── */
.hdr {
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg);
  color: var(--header-fg);
  display: flex; align-items: center;
  padding: 0 16px;
  height: 48px;
  gap: 12px;
}
.hdr-left  { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.hdr-mid   { display: flex; align-items: center; gap: 14px; flex: 1; justify-content: center; }
.hdr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.hdr h1 { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; }
.hdr-nav { display: flex; align-items: center; gap: 6px; }
.hdr-nav button {
  background: none; border: 1px solid #444; border-radius: 5px;
  color: var(--header-fg); width: 26px; height: 26px;
  font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.hdr-nav button:hover { background: #252525; }
.hdr-year { font-size: 15px; font-weight: 600; min-width: 40px; text-align: center; }

.hdr-btn {
  background: none; border: 1px solid #444; border-radius: 5px;
  color: var(--header-fg); padding: 4px 10px;
  font-size: 11px; cursor: pointer; white-space: nowrap;
}
.hdr-btn:hover { background: #252525; }
.user-email { color: #666; font-size: 11px; }

/* ── Zoom Slider ── */
.zoom-ctrl { display: flex; align-items: center; gap: 6px; }
.zoom-icon { color: #777; font-size: 14px; font-weight: 700; user-select: none; line-height: 1; }
.zoom-slider {
  -webkit-appearance: none; appearance: none;
  width: 88px; height: 3px;
  background: #444; border-radius: 2px; outline: none; cursor: pointer;
}
.zoom-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px; height: 13px; border-radius: 50%;
  background: #d0d0d0; cursor: pointer;
}
.zoom-slider::-moz-range-thumb {
  width: 13px; height: 13px; border-radius: 50%;
  border: none; background: #d0d0d0; cursor: pointer;
}

/* ── Calendar Picker ── */
.cal-picker { position: relative; }

.cal-drop {
  position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: #1c1c1c; border: 1px solid #333;
  border-radius: 8px; padding: 6px 0;
  min-width: 210px; max-height: 300px; overflow-y: auto;
  box-shadow: 0 8px 28px rgba(0,0,0,0.5);
  z-index: 300;
}
.cal-drop-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 3px 12px 7px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: #555; border-bottom: 1px solid #2a2a2a;
}
.cal-drop-hdr button {
  background: none; border: none; color: #777; font-size: 11px; cursor: pointer; padding: 0;
}
.cal-drop-hdr button:hover { color: #e0e0e0; }

.cal-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 12px; cursor: pointer;
  font-size: 12px; color: #d8d8d8;
  transition: background 0.06s;
}
.cal-item:hover { background: #272727; }
.cal-item input[type=checkbox] { accent-color: #5b9cf6; cursor: pointer; flex-shrink: 0; }
.cal-swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.cal-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── DOW Header ── */
.dow-header {
  position: sticky; top: 48px; z-index: 99;
  display: grid; grid-template-columns: repeat(7, 1fr);
  background: var(--bg2);
  border-bottom: 2px solid var(--fg);
}
.dow-header div {
  text-align: center; padding: 7px 4px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--muted); border-right: 1px solid var(--border);
}
.dow-header div:last-child { border-right: none; }
.dow-header div.wknd { background: var(--weekend); }

/* ── Week Row ── */
.week-row {
  display: grid; grid-template-columns: repeat(7, 1fr);
  border-bottom: 1px solid var(--border);
}

/* ── Day Cell ── */
.day {
  border-right: 1px solid var(--border);
  padding: 5px 7px;
  cursor: pointer;
  background: var(--bg2);
  transition: background 0.07s;
  height: var(--cell-h);
  min-height: 44px;
  overflow: hidden;
}
.day:last-child  { border-right: none; }
.day:hover       { background: var(--hover); }
.day.wknd        { background: var(--weekend); }
.day.wknd:hover  { background: var(--hover); }
.day.other-month { background: var(--bg); opacity: 0.4; }
.day.today       { background: var(--today-bg) !important; color: var(--today-fg) !important; }
.day.today:hover { opacity: 0.9; }

/* Compact mode — applied when cell-h < 58px */
body.compact .day              { padding: 2px 3px; }
body.compact .day-dow          { display: none; }
body.compact .day-num          { font-size: 10px; }
body.compact .month-badge      { font-size: 7px !important; padding: 1px 3px !important; }
body.compact .day-event        { font-size: 9px !important; padding: 1px 3px !important; line-height: 1.25 !important; border-radius: 2px !important; }
body.compact .more-events      { font-size: 8px; }
body.compact .day-top          { margin-bottom: 2px; gap: 3px; }
body.compact .day-events       { gap: 1px; }

/* Day top row */
.day-top { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.day-dow {
  font-size: 9px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--muted);
}
.day.today .day-dow { color: rgba(255,255,255,0.55); }
.day-num { font-size: 12px; font-weight: 600; color: var(--fg); }
.day.today .day-num { color: var(--today-fg); }

/* Month badge */
.month-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--month-badge); color: var(--month-badge-fg);
  font-size: 9px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 2px 5px; border-radius: 3px; margin-left: 2px;
}

/* Events */
.day-events { display: flex; flex-direction: column; gap: 2px; }
.day-event {
  font-size: 11px; font-weight: 500;
  padding: 2px 5px; border-radius: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: #fff; line-height: 1.4;
}
.day.today .day-event  { opacity: 0.88; }
.day-event.allday      { border-left: 3px solid rgba(255,255,255,0.45); }
.more-events           { font-size: 10px; color: var(--muted); padding: 0 5px; }
.day.today .more-events { color: rgba(255,255,255,0.5); }

/* ── Sign-in ── */
.signin-wrap {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 80vh; gap: 20px; padding: 40px;
}
.signin-wrap h2 { font-size: 26px; font-weight: 300; letter-spacing: -0.3px; }
.signin-wrap p  { color: var(--muted); font-size: 14px; }
.signin-btn {
  display: flex; align-items: center; gap: 10px;
  background: var(--fg); color: var(--bg);
  border: none; border-radius: 8px;
  padding: 12px 28px; font-size: 14px; font-weight: 500; cursor: pointer;
}
.signin-btn:hover { opacity: 0.85; }

/* ── Loading ── */
.loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; gap: 14px;
  color: var(--muted); font-size: 14px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border); border-top-color: var(--fg);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Modal ── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 900;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(2px);
}
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 12px; padding: 22px;
  max-width: 400px; width: 90%; max-height: 72vh; overflow-y: auto;
  box-shadow: 0 10px 44px rgba(0,0,0,0.2);
}
.modal h3     { font-size: 14px; font-weight: 600; margin-bottom: 14px; padding-right: 24px; }
.modal-x      { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); }
.modal-x:hover { color: var(--fg); }
.ev           { padding: 9px 0; border-bottom: 1px solid var(--border); }
.ev:last-child { border-bottom: none; }
.ev-title     { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 7px; }
.ev-dot       { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.ev-meta      { font-size: 11px; color: var(--muted); margin-top: 2px; padding-left: 14px; }

/* ── Legend ── */
.legend {
  padding: 10px 20px; border-top: 1px solid var(--border);
  display: flex; flex-wrap: wrap; gap: 14px;
  font-size: 11px; color: var(--muted); background: var(--bg2);
}
.leg-item { display: flex; align-items: center; gap: 5px; }
.leg-dot  { width: 8px; height: 8px; border-radius: 50%; }

/* ── Print ── */
@media print {
  .hdr, .dow-header, .legend { position: static !important; }
  .day { min-height: 60px; page-break-inside: avoid; }
  .week-row { page-break-inside: avoid; }
  .cal-drop, .zoom-ctrl { display: none !important; }
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <h1>View 365</h1>
    <div class="hdr-nav">
      <button onclick="changeYear(year-1)" title="Previous year">‹</button>
      <span class="hdr-year" id="yearLabel">2026</span>
      <button onclick="changeYear(year+1)" title="Next year">›</button>
    </div>
  </div>

  <div class="hdr-mid" id="hdrMid">
    <!-- zoom slider always visible; cal picker injected after sign-in -->
    <div class="zoom-ctrl">
      <span class="zoom-icon" title="Zoom out">−</span>
      <input type="range" class="zoom-slider" id="zoomSlider"
             min="44" max="140" value="90"
             oninput="setZoom(this.value)" title="Row height">
      <span class="zoom-icon" title="Zoom in">+</span>
    </div>
  </div>

  <div class="hdr-right" id="hdrRight">
    <button class="hdr-btn" onclick="toggleDark()">◑</button>
    <button class="hdr-btn" onclick="window.print()">⎙</button>
  </div>
</div>

<div class="dow-header">
  <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div>
  <div class="wknd">Fri</div><div class="wknd">Sat</div>
</div>

<div id="app"></div>
<div class="legend" id="legend" style="display:none;"></div>

<script>
const CLIENT_ID = '142509151438-e5ebvf3rkn3298cdqnvse6su6pvfd47k.apps.googleusercontent.com';
const SCOPES    = 'https://www.googleapis.com/auth/calendar.readonly email';
const MONS      = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const DOW       = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let token       = sessionStorage.getItem('v365_tok')   || null;
let email       = sessionStorage.getItem('v365_email') || '';
let year        = new Date().getFullYear();
let cals        = [];         // [{id, name, color}]
let enabledCals = null;       // Set of enabled cal IDs; null = all
let evts        = {};         // dateKey -> [{title, start, allDay, color, calId, calName, location}]
let tclient     = null;
let isDark      = localStorage.getItem('v365_dark') === '1';
let cellH       = parseInt(localStorage.getItem('v365_zoom') || '90');
let calDropOpen = false;

// ── Helpers ──
function dk(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmt(dt) {
  if (!dt) return '';
  let h = dt.getHours(), m = dt.getMinutes(), ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return m ? `${h}:${String(m).padStart(2,'0')} ${ap}` : `${h} ${ap}`;
}
function isCalEnabled(id) { return !enabledCals || enabledCals.has(id); }

// ── Zoom ──
function applyZoom(val) {
  cellH = parseInt(val);
  document.documentElement.style.setProperty('--cell-h', cellH + 'px');
  document.body.classList.toggle('compact', cellH < 58);
  localStorage.setItem('v365_zoom', cellH);
  const s = document.getElementById('zoomSlider');
  if (s) s.value = cellH;
}
function setZoom(val) { applyZoom(val); }

// ── Dark Mode ──
function toggleDark() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  localStorage.setItem('v365_dark', isDark ? '1' : '0');
}

// ── Init ──
function init() {
  if (isDark) document.body.classList.add('dark');
  applyZoom(cellH);
  document.getElementById('yearLabel').textContent = year;
  token ? onIn() : showSignIn();
}

// ── Auth ──
function initTC() {
  if (tclient) return;
  tclient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: r => {
      if (r.error) { alert('Sign-in error: ' + r.error); return; }
      token = r.access_token;
      sessionStorage.setItem('v365_tok', token);
      getEmail();
    }
  });
}

function signIn() {
  if (typeof google === 'undefined' || !google.accounts) { alert('Google loading… try again.'); return; }
  initTC();
  tclient.requestAccessToken();
}

async function getEmail() {
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo',
      { headers: { Authorization: 'Bearer ' + token } });
    if (r.ok) {
      const d = await r.json();
      email = d.email || '';
      sessionStorage.setItem('v365_email', email);
    }
  } catch(e) {}
  onIn();
}

function signOut() {
  token = null; email = ''; cals = []; evts = {};
  enabledCals = null;
  sessionStorage.removeItem('v365_tok');
  sessionStorage.removeItem('v365_email');
  document.getElementById('legend').style.display = 'none';
  showSignIn();
  renderHdr();
}

function onIn() {
  renderHdr();
  fetchAllEvents();
}

// ── Header Render ──
function renderHdr() {
  const mid = document.getElementById('hdrMid');
  const rgt = document.getElementById('hdrRight');

  const zoomHtml = `
    <div class="zoom-ctrl">
      <span class="zoom-icon">−</span>
      <input type="range" class="zoom-slider" id="zoomSlider"
             min="44" max="140" value="${cellH}"
             oninput="setZoom(this.value)" title="Row height">
      <span class="zoom-icon">+</span>
    </div>`;

  if (token && cals.length > 0) {
    const enabledCount = enabledCals ? enabledCals.size : cals.length;
    mid.innerHTML = `
      <div class="cal-picker" id="calPicker">
        <button class="hdr-btn" onclick="toggleCalDrop(event)">
          📅 Calendars${enabledCount < cals.length ? ` (${enabledCount})` : ''} ▾
        </button>
        <div class="cal-drop" id="calDrop" style="display:none;"></div>
      </div>
      ${zoomHtml}`;
    renderCalDrop();
  } else {
    mid.innerHTML = zoomHtml;
  }

  rgt.innerHTML =
    (token
      ? `<span class="user-email">${email}</span>
         <button class="hdr-btn" onclick="signOut()">Sign out</button>`
      : `<button class="hdr-btn" onclick="signIn()">Sign in</button>`) +
    `<button class="hdr-btn" onclick="toggleDark()" title="Toggle dark mode">◑</button>
     <button class="hdr-btn" onclick="window.print()" title="Print">⎙</button>`;
}

// ── Calendar Dropdown ──
function renderCalDrop() {
  const drop = document.getElementById('calDrop');
  if (!drop) return;

  let h = `
    <div class="cal-drop-hdr">
      <span>Calendars</span>
      <span>
        <button onclick="calSelectAll()">All</button>
        &nbsp;
        <button onclick="calSelectNone()">None</button>
      </span>
    </div>`;

  cals.forEach(c => {
    const checked = isCalEnabled(c.id);
    const safeId  = c.id.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    h += `
      <label class="cal-item">
        <input type="checkbox" ${checked ? 'checked' : ''}
               onchange="toggleCal('${safeId}', this.checked)">
        <span class="cal-swatch" style="background:${c.color}"></span>
        <span class="cal-name" title="${c.name}">${c.name}</span>
      </label>`;
  });

  drop.innerHTML = h;
}

function toggleCalDrop(e) {
  e.stopPropagation();
  calDropOpen = !calDropOpen;
  const drop = document.getElementById('calDrop');
  if (drop) drop.style.display = calDropOpen ? 'block' : 'none';
}

function toggleCal(id, checked) {
  if (!enabledCals) enabledCals = new Set(cals.map(c => c.id));
  if (checked) enabledCals.add(id); else enabledCals.delete(id);
  saveCalPrefs();
  renderHdr();           // update button label
  buildGrid();
}

function calSelectAll() {
  enabledCals = new Set(cals.map(c => c.id));
  saveCalPrefs();
  renderHdr();
  // re-open drop
  setTimeout(() => {
    calDropOpen = true;
    const d = document.getElementById('calDrop');
    if (d) d.style.display = 'block';
  }, 0);
  buildGrid();
}

function calSelectNone() {
  enabledCals = new Set();
  saveCalPrefs();
  renderHdr();
  setTimeout(() => {
    calDropOpen = true;
    const d = document.getElementById('calDrop');
    if (d) d.style.display = 'block';
  }, 0);
  buildGrid();
}

function saveCalPrefs() {
  const ids = enabledCals ? [...enabledCals] : cals.map(c => c.id);
  localStorage.setItem('v365_cals', JSON.stringify(ids));
}

document.addEventListener('click', e => {
  if (calDropOpen && !e.target.closest('#calPicker')) {
    calDropOpen = false;
    const d = document.getElementById('calDrop');
    if (d) d.style.display = 'none';
  }
});

// ── Sign-in Screen ──
function showSignIn() {
  document.getElementById('app').innerHTML = `
    <div class="signin-wrap">
      <h2>Your year, at a glance.</h2>
      <p>Connect Google Calendar to see all 365 days.</p>
      <button class="signin-btn" onclick="signIn()">
        <svg width="16" height="16" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0124 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 01-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        Sign in with Google
      </button>
    </div>`;
}

// ── API Helpers ──
async function gf(url) {
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
  if (r.status === 401) { signOut(); throw new Error('expired'); }
  return r;
}

// ── Fetch All Events ──
async function fetchAllEvents() {
  document.getElementById('app').innerHTML =
    '<div class="loading"><div class="spinner"></div><p>Loading your year…</p></div>';
  try {
    // Get calendar list
    const cr = await gf('https://www.googleapis.com/calendar/v3/users/me/calendarList');
    const cd = await cr.json();
    cals = (cd.items || [])
      .filter(c => c.selected !== false)
      .map(c => ({ id: c.id, name: c.summary || c.id, color: c.backgroundColor || '#555' }));

    // Restore or initialize enabled calendars
    const saved = localStorage.getItem('v365_cals');
    if (saved && !enabledCals) {
      try {
        const arr = JSON.parse(saved);
        const valid = new Set(cals.map(c => c.id));
        const filtered = arr.filter(id => valid.has(id));
        enabledCals = filtered.length > 0 ? new Set(filtered) : null;
      } catch(e) { enabledCals = null; }
    }

    // Fetch events for all cals
    evts = {};
    const tMin = new Date(year, 0,  1).toISOString();
    const tMax = new Date(year, 11, 31, 23, 59, 59).toISOString();

    for (const cal of cals) {
      let pt = '';
      do {
        let url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events` +
          `?timeMin=${tMin}&timeMax=${tMax}&singleEvents=true&orderBy=startTime&maxResults=2500&timeZone=America/Chicago`;
        if (pt) url += '&pageToken=' + pt;
        const er = await gf(url);
        const ed = await er.json();
        for (const ev of (ed.items || [])) {
          if (ev.status === 'cancelled') continue;
          const allDay = !!ev.start.date;
          const sd = new Date(ev.start.date   || ev.start.dateTime);
          const en = new Date(ev.end.date     || ev.end.dateTime);
          if (allDay) {
            const d = new Date(sd);
            while (d < en) { addEv(d, ev, cal, true); d.setDate(d.getDate() + 1); }
          } else {
            addEv(sd, ev, cal, false);
          }
        }
        pt = ed.nextPageToken || '';
      } while (pt);
    }

    renderHdr();   // inject cal picker now that cals are loaded
    buildGrid();
  } catch(e) {
    if (e.message !== 'expired')
      document.getElementById('app').innerHTML =
        `<div class="loading"><p>Error loading calendar. <button onclick="fetchAllEvents()">Retry</button></p></div>`;
  }
}

function addEv(d, ev, cal, allDay) {
  if (d.getFullYear() !== year) return;
  const key = dk(d);
  if (!evts[key]) evts[key] = [];
  evts[key].push({
    title:   ev.summary || '(No title)',
    start:   ev.start.dateTime ? new Date(ev.start.dateTime) : null,
    allDay,
    color:   cal.color,
    calId:   cal.id,
    calName: cal.name,
    location: ev.location || ''
  });
}

// ── Build Week Grid ──
function buildGrid() {
  const today = dk(new Date());

  const jan1     = new Date(year, 0, 1);
  const startSun = new Date(jan1);
  startSun.setDate(jan1.getDate() - jan1.getDay());

  const dec31  = new Date(year, 11, 31);
  const endSat = new Date(dec31);
  endSat.setDate(dec31.getDate() + (6 - dec31.getDay()));

  let html = '<div class="weeks">';
  let cur  = new Date(startSun);

  while (cur <= endSat) {
    html += '<div class="week-row">';
    for (let d = 0; d < 7; d++) {
      const date  = new Date(cur);
      const key   = dk(date);
      const dow   = date.getDay();
      const inYr  = date.getFullYear() === year;
      const isToday    = key === today;
      const isWknd     = dow === 5 || dow === 6;
      const isFirstMo  = date.getDate() === 1 && inYr;
      const dayEvts    = (evts[key] || []).filter(e => isCalEnabled(e.calId));

      let cls = 'day';
      if (isToday)      cls += ' today';
      else if (!inYr)   cls += ' other-month';
      else if (isWknd)  cls += ' wknd';

      html += `<div class="${cls}" onclick="showModal('${key}')">`;
      html += '<div class="day-top">';
      html += `<span class="day-dow">${DOW[dow]}</span>`;
      html += `<span class="day-num">${date.getDate()}</span>`;
      if (isFirstMo) html += `<span class="month-badge">${MONS[date.getMonth()]}</span>`;
      html += '</div>';

      if (dayEvts.length) {
        html += '<div class="day-events">';
        const MAX = 3;
        dayEvts.slice(0, MAX).forEach(ev => {
          const t = ev.allDay ? '' : fmt(ev.start) + ' ';
          html += `<div class="day-event${ev.allDay ? ' allday' : ''}"
                       style="background:${ev.color}" title="${ev.title}">${t}${ev.title}</div>`;
        });
        if (dayEvts.length > MAX)
          html += `<div class="more-events">+${dayEvts.length - MAX} more</div>`;
        html += '</div>';
      }

      html += '</div>';
      cur.setDate(cur.getDate() + 1);
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('app').innerHTML = html;

  // Legend
  const leg = document.getElementById('legend');
  const vis = cals.filter(c => isCalEnabled(c.id));
  if (vis.length) {
    leg.style.display = 'flex';
    leg.innerHTML = '<span style="font-weight:600;margin-right:4px;">Calendars:</span>' +
      vis.map(c => `<span class="leg-item"><span class="leg-dot" style="background:${c.color}"></span>${c.name}</span>`).join('');
  } else {
    leg.style.display = 'none';
  }

  // Scroll to today on initial load
  setTimeout(() => {
    const el = document.querySelector('.day.today');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 120);
}

// ── Day Modal ──
function showModal(key) {
  const list = (evts[key] || []).filter(e => isCalEnabled(e.calId));
  const [y, m, d] = key.split('-').map(Number);
  const dateStr = new Date(y, m-1, d).toLocaleDateString('en-US',
    { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  let h = `<div class="modal-bg" onclick="if(event.target===this)this.remove()"><div class="modal">`;
  h += `<button class="modal-x" onclick="this.closest('.modal-bg').remove()">✕</button>`;
  h += `<h3>${dateStr}</h3>`;

  if (!list.length) {
    h += '<p style="color:var(--muted);font-size:13px;">No events this day.</p>';
  } else {
    list.forEach(ev => {
      h += `<div class="ev">
        <div class="ev-title"><span class="ev-dot" style="background:${ev.color}"></span>${ev.title}</div>`;
      if (ev.allDay)       h += `<div class="ev-meta">All day · ${ev.calName}</div>`;
      else if (ev.start)   h += `<div class="ev-meta">${fmt(ev.start)} · ${ev.calName}</div>`;
      if (ev.location)     h += `<div class="ev-meta">📍 ${ev.location}</div>`;
      h += '</div>';
    });
  }
  h += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', h);
}

// ── Year Nav ──
function changeYear(y) {
  year = y;
  document.getElementById('yearLabel').textContent = year;
  if (token) fetchAllEvents(); else buildGrid();
}

// ── Boot ──
window.addEventListener('load', () => setTimeout(init, 500));
// Fallback if Google script is slow
setTimeout(() => {
  if (!document.querySelector('.signin-wrap') &&
      !document.querySelector('.loading') &&
      !document.querySelector('.weeks')) init();
}, 2500);
</script>
